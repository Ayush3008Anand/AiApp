<!DOCTYPE html>
<html>
<head>
    <title>AI Revision Output</title>
</head>
<body>

<h2>📌 Summary</h2>
<p>{{ summary }}</p>

<hr>

<h2>🧠 AI Generated Revision Questions</h2>

{% if questions %}
    <ol>
        {% for q in questions %}
            <li>{{ q }}</li>
        {% endfor %}
    </ol>
{% else %}
    <p>No questions generated.</p>
{% endif %}

<br>

<a href="/">⬅ Upload Another PDF</a>

</body>
</html>
