<!DOCTYPE html>
<html>
<head>
    <title>AI Revision Tool</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        h2 {
            color: #444;
            margin-top: 25px;
        }

        form {
            text-align: center;
            margin-bottom: 25px;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .card {
            background: #f9f9f9;
            padding: 18px;
            border-radius: 10px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .questions li {
            margin-bottom: 8px;
        }

        .placeholder {
            text-align: center;
            color: gray;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>📄 AI Revision Tool</h1>

        <!-- Upload Again -->
        <form action="/process" method="POST" enctype="multipart/form-data">
            <input type="file" name="pdf" required>
            <br>
            <button type="submit">Generate Summary + Questions</button>
        </form>

        <!-- Summary Section -->
        <h2>📘 Summary</h2>
        <div class="card">
            {% if summary %}
                <p>{{ summary }}</p>
            {% else %}
                <div class="placeholder">No summary generated yet.</div>
            {% endif %}
        </div>

        <!-- Questions Section -->
        <h2>❓ Questions</h2>
        <div class="card">
            {% if questions %}
                <ul class="questions">
                    {% for q in questions %}
                        <li>{{ q }}</li>
                    {% endfor %}
                </ul>
            {% else %}
                <div class="placeholder">No questions generated yet.</div>
            {% endif %}
        </div>

    </div>
</body>
</html>
