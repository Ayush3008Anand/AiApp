<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body style="font-family:Arial; margin:40px;">

    <h2>📌 Summary</h2>
    <p>{{ summary }}</p>

    <hr>

    <h2>🧠 MCQs</h2>

    {% for q in mcqs %}
        <div style="margin-bottom:20px;">
            <p><b>Q{{ loop.index }}:</b> {{ q.question }}</p>

            {% for opt in q.options %}
                <label>
                    <input type="radio" name="q{{ loop.index }}">
                    {{ opt }}
                </label><br>
            {% endfor %}
        </div>
    {% endfor %}

</body>
</html>
