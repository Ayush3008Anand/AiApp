<!DOCTYPE html>
<html>
<head>
    <title>AI Revision Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            margin: 15px 0;
            padding: 8px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>📄 Upload PDF</h2>

        <form action="/process" method="POST" enctype="multipart/form-data">
            <input type="file" name="pdf" required>
            <br>
            <button type="submit">Generate Summary + Questions</button>
        </form>
    </div>
</body>
</html>
